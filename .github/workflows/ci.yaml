name: CI

on:
  push:
    branches: [main]
    tags:
      - '*'
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff linter
        run: uv run ruff check .

      - name: Ruff formatter
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest
